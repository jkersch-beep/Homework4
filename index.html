<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Title</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Recipe Finder</h1>
      <p>Search for any meal and discover how to make it</p>
    </header>

    <section class="search-section">
      <input
        type="text"
        id="search-input"
        placeholder="e.g. chicken, pasta, sushi..."
      />
      <button id="search-btn">Search</button>
    </section>

    <!-- Status message (lets know what the page is doing) -->
    <p id="status-msg"></p>

    <div id="results"></div>

    <script src="script.js"></script>
  </body>
</html>
